name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish Naps2Paperless/Naps2Paperless.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Zip release
        run: Compress-Archive -Path publish/* -DestinationPath Naps2Paperless-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Naps2Paperless-${{ github.ref_name }}.zip
          generate_release_notes: true
